<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Boilerplate App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff 0%, #f0f9ff 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1e293b;
      padding: 1.5rem;
    }
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 1.25rem;
      box-shadow: 0 8px 32px rgba(79,70,229,0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 1.25rem;
      background: #eef2ff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 0.625rem; }
    p { font-size: 0.9375rem; color: #64748b; line-height: 1.6; margin-bottom: 1.75rem; }
    button {
      background: #4f46e5; color: #fff; border: none;
      border-radius: 0.625rem; padding: 0.625rem 1.5rem;
      font-size: 0.9375rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s; width: 100%;
    }
    button:hover { background: #4338ca; }
    button:active { transform: scale(0.97); }
    .status { margin-top: 1.25rem; font-size: 0.8125rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="#4f46e5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="status" id="status">Checking connection...</p>
  </div>
  <script>
    function check() {
      document.getElementById('status').textContent =
        navigator.onLine ? 'Connection restored — reloading…' : 'Still offline';
      if (navigator.onLine) setTimeout(() => window.location.reload(), 800);
    }
    window.addEventListener('online', check);
    window.addEventListener('offline', check);
    check();
  </script>
</body>
</html>
